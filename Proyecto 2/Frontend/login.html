<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Archivos</title>
    <link rel="stylesheet" href="css/styles_login.css">
    <link rel="stylesheet" href="js/script.js">
</head>
<body>

    <div class="login-container">
        <h2>🔒 Iniciar Sesión</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="txtUser">Usuario</label>
                <input type="text" id="txtUser" placeholder="ej. root" required>
            </div>
            
            <div class="input-group">
                <label for="txtPass">Contraseña</label>
                <input type="password" id="txtPass" placeholder="••••••••" required>
            </div>
            
            <div class="input-group">
                <label for="txtId">ID de Partición</label>
                <input type="text" id="txtId" placeholder="ej. 541a" required>
            </div>

            <button type="submit">Entrar al Sistema</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
