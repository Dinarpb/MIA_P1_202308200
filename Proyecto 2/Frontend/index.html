<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Archivos EXT2 - Dina</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --accent: #bd93f9;
            --success: #50fa7b;
            --error: #ff5555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 90vh;
        }
        .panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        h2 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        textarea {
            width: 100%;
            flex-grow: 1;
            background-color: #191a21;
            color: #f8f8f2;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            margin-bottom: 10px;
        }
        button {
            background-color: var(--accent);
            color: #282a36;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background-color: #ff79c6; }
        
        #consolaSalida {
            background-color: #000;
            color: var(--success);
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #444;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>💻 Terminal de Entrada</h2>
        <textarea id="txtEntrada" placeholder="Escribe tus comandos aquí...&#10;Ejemplo:&#10;mkdisk -size=5 -path=/home/disco.dsk&#10;mount -path=/home/disco.dsk -name=Part1"></textarea>
        <button onclick="ejecutarComandos()">Ejecutar Comandos</button>
    </div>

    <div class="panel">
        <h2>🖥️ Salida del Servidor</h2>
        <div id="consolaSalida">Esperando comandos...</div>
    </div>

    <script>
        async function ejecutarComandos() {
            const entrada = document.getElementById('txtEntrada').value;
            const salida = document.getElementById('consolaSalida');
            
            if (!entrada.trim()) {
                salida.innerHTML += "<br><span style='color:var(--error)'>[ERROR] No hay comandos para ejecutar.</span>";
                return;
            }

            salida.innerHTML += `<br><span style='color:white'>> Ejecutando...</span>`;

            try {
                // Hacemos la petición POST al backend en Go
                const response = await fetch('http://localhost:3000/ejecutar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando: entrada })
                });

                const data = await response.json();
                
                // Mostramos la respuesta del servidor en la consola visual
                salida.innerHTML += `<br>${data.output || JSON.stringify(data)}`;
                salida.scrollTop = salida.scrollHeight; // Auto-scroll hacia abajo

            } catch (error) {
                salida.innerHTML += `<br><span style='color:var(--error)'>[ERROR CONEXIÓN] ¿Está corriendo tu servidor Go en el puerto 3000?</span>`;
            }
        }
    </script>
</body>
</html>
